name: LOF溢价监控

on:
  schedule:
    - cron: '30 1 * * 1-5'   # UTC 01:30 = 北京时间 09:30
  workflow_dispatch:         # 手动运行按钮

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run LOF monitor
        env:
          WECHAT_WORK_KEY: ${{ secrets.WECHAT_WORK_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          python lof_notify.py

      - name: Commit & Push history.csv
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add history.csv
          git commit -m "Update history.csv" || echo "No changes"
          git push
